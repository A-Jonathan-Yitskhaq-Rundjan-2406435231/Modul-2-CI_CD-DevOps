<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Payment</title>
</head>
<body>
<h3>Pay Order</h3>
<p>Order ID: <span th:text="${order.id}">order-id</span></p>
<form th:action="@{/order/pay/{orderId}(orderId=${order.id})}" method="post">
    <label for="methodSelect">Method</label>
    <select id="methodSelect" name="method">
        <option value="VOUCHER_CODE">VOUCHER_CODE</option>
        <option value="CASH_ON_DELIVERY">CASH_ON_DELIVERY</option>
        <option value="BANK_TRANSFER">BANK_TRANSFER</option>
    </select>
    <br/>
    <label for="voucherCodeInput">Voucher Code</label>
    <input id="voucherCodeInput" name="voucherCode" type="text"/>
    <br/>
    <label for="addressInput">Address</label>
    <input id="addressInput" name="address" type="text"/>
    <br/>
    <label for="deliveryFeeInput">Delivery Fee</label>
    <input id="deliveryFeeInput" name="deliveryFee" type="text"/>
    <br/>
    <label for="bankNameInput">Bank Name</label>
    <input id="bankNameInput" name="bankName" type="text"/>
    <br/>
    <label for="referenceCodeInput">Reference Code</label>
    <input id="referenceCodeInput" name="referenceCode" type="text"/>
    <br/>
    <button type="submit">Pay</button>
</form>
</body>
</html>
