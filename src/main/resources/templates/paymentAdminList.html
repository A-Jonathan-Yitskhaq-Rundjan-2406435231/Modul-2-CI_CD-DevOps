<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin List</title>
</head>
<body>
<h3>All Payments</h3>
<div th:if="${payments == null || payments.isEmpty()}">
    <p id="emptyPayments">No payments</p>
</div>
<div th:if="${payments != null && !payments.isEmpty()}">
    <ul>
        <li th:each="payment : ${payments}">
            <span class="paymentId" th:text="${payment.id}">payment-id</span>
            <span class="paymentStatus" th:text="${payment.status}">status</span>
            <a th:href="@{/payment/admin/detail/{paymentId}(paymentId=${payment.id})}">Detail</a>
        </li>
    </ul>
</div>
</body>
</html>
